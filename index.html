    <script>
  (function () {
    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

    const style = document.createElement("style");
    style.type = "text/css";

    if (isSafari) {
      // Safari-specific styles: use similar logic as Chrome, but adjusted for Safari quirks
      style.textContent = `
        @media (max-width: 768px) {
          :root {
            --nav-height: 4rem;
          }

          body {
            --nav-padding: calc(var(--nav-height) + env(safe-area-inset-top, 0));
            padding-top: var(--nav-padding);
            padding-bottom: env(safe-area-inset-bottom, 0);
            padding-left: env(safe-area-inset-left, 0);
            padding-right: env(safe-area-inset-right, 0);
            -webkit-overflow-scrolling: touch;
          }
        }
      `;

      // Safari viewport height fix
      function setVHUnit() {
        const vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
      }

      window.addEventListener('resize', setVHUnit);
      window.addEventListener('orientationchange', setVHUnit);
      setVHUnit();
    } else {
      // Chrome and others — keep your original working layout
      style.textContent = `
        @media (max-width: 768px) {
          :root {
            --nav-height: 4rem;
          }

          body {
            --nav-padding: calc(var(--nav-height) + env(safe-area-inset-top, 0));
            padding-top: var(--nav-padding);
            padding-bottom: var(--nav-padding);
          }
        }
      `;
    }

    document.head.appendChild(style);
  })();
</script>
